name = "music-megabyte-space"
account_id = "84fa0d1b16ff8086dd958c468ce7fd59"
compatibility_date = "2025-04-01"
main = "worker/index.ts"

routes = [
  { pattern = "music.megabyte.space", custom_domain = true },
  { pattern = "bzmusic.win", custom_domain = true },
  { pattern = "www.bzmusic.win", custom_domain = true }
]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [
  "/",
  "/audio/*",
  "/lyrics/*",
  "/canopy",
  "/canopy/*",
  "/halo",
  "/halo/*",
  "/appeal",
  "/appeal/*",
  "/canon",
  "/canon/*",
  "/desiiignare",
  "/desiiignare/*",
  "/wormhole",
  "/wormhole/*",
  "/mercy-drop",
  "/mercy-drop/*",
  "/embed/*",
  "/ashton/*",
  "/ashton-letter/*",
  "/clip/*",
  "/press/*",
  "/about",
  "/process",
  "/credits",
  "/press",
  "/theology",
  "/contact",
  "/support",
  "/merch",
  "/privacy",
  "/terms",
  "/api/*",
  "/health",
  "/feed.xml",
  "/rss.xml",
  "/llms.txt"
]

[vars]
LISTMONK_URL = "https://listmonk.megabyte.space"
LISTMONK_API_USER = "automation"
LISTMONK_LIST_NAME = "music.megabyte.space"

[[kv_namespaces]]
binding = "COUNTERS"
id = "2a9973599d5c453c984cdb69758f9bde"

# Workers AI binding — drives /api/ai/chat via Llama 3.3 70B (FP8-fast).
# No API key needed; included in the free tier for typical chat volume.
[ai]
binding = "AI"

[observability]
enabled = true

# Daily 09:00 UTC trigger for the Listmonk Foundation flows orchestrator
# (worker/index.ts → runFoundationFlowsCron). Scans subscribers + fires
# first-month day-3/10/21 + 90-day winback transactional emails. Manual
# backfill available at GET /api/listmonk/foundation-cron?token=<admin>.
[triggers]
crons = ["0 9 * * *"]
